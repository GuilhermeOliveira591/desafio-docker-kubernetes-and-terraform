apiVersion: v1
kind: Service
metadata:
  name: {{ include "mural.fullname" . }}-web
  labels:
    {{- include "mural.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "mural.name" . }}
    component: web
  ports:
    - port: 80
      targetPort: {{ .Values.web.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mural.fullname" . }}-web
  labels:
    {{- include "mural.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mural.name" . }}
      component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mural.name" . }}
        component: web
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.web.repository }}:{{ .Values.image.web.tag }}"
          imagePullPolicy: {{ .Values.image.web.pullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            # O nginx faz proxy de /api para o Service da API (resolvido por envsubst).
            - name: API_UPSTREAM
              value: "{{ include "mural.apiService" . }}:80"
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.web.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
