apiVersion: v1
kind: Service
metadata:
  name: {{ include "mural.apiService" . }}
  labels:
    {{- include "mural.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "mural.name" . }}
    component: api
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mural.apiService" . }}
  labels:
    {{- include "mural.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mural.name" . }}
      component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mural.name" . }}
        component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.api.repository }}:{{ .Values.image.api.tag }}"
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: PORT
              value: {{ .Values.api.port | quote }}
            # Connection string vem do Secret — nunca em texto plano aqui.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "mural.fullname" . }}-db
                  key: DATABASE_URL
          # liveness = processo vivo (/healthz não toca no banco).
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          # readiness = pronto para servir (só passa quando o schema existe -> migration rodou).
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
