# Postgres como StatefulSet + PVC (volumeClaimTemplates) — o padrão correto para
# banco em Kubernetes: identidade estável e volume persistente por réplica.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mural.postgresHost" . }}
  labels:
    {{- include "mural.labels" . | nindent 4 }}
spec:
  clusterIP: None          # headless: dá DNS estável ao pod do StatefulSet
  selector:
    app.kubernetes.io/name: {{ include "mural.name" . }}
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "mural.postgresHost" . }}
  labels:
    {{- include "mural.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "mural.postgresHost" . }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mural.name" . }}
      component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mural.name" . }}
        component: postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mural.fullname" . }}-db
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.postgres.user }}", "-d", "{{ .Values.postgres.database }}"]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgres.storage }}
