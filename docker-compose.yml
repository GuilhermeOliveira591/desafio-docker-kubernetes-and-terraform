# docker-compose APENAS para você RODAR e ENTENDER a app localmente.
# Ele NÃO é a entrega do desafio: usa imagens oficiais (go run, nginx, postgres)
# de propósito, para não te dar de graça os Dockerfiles / o Helm / o Terraform.
#
# Repare no que este compose te mostra sobre o sistema:
#   - a migração roda num serviço SEPARADO, ANTES da API (fricção real do K8s = Job);
#   - a API só conhece o banco pela env DATABASE_URL (que carrega a senha);
#   - o front (nginx) faz proxy de /api para a API — ele não sabe a URL absoluta.
#
# Suba com:  docker compose up --build
# Acesse:    http://localhost:8080

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mural
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d mural"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Roda as migrations e sai. A API depende deste passo ter terminado com sucesso.
  migrate:
    image: postgres:16-alpine
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: secret
    volumes:
      - ./app/api/migrations:/migrations:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        for f in $$(ls /migrations/*.sql | sort); do
          echo "aplicando $$f";
          psql -h db -U app -d mural -v ON_ERROR_STOP=1 -f "$$f";
        done

  api:
    image: golang:1.23-alpine
    working_dir: /src
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://app:secret@db:5432/mural?sslmode=disable
      PORT: "8080"
    volumes:
      - ./app/api:/src
      - gocache:/go
    command: ["go", "run", "."]

  web:
    image: nginx:1.27-alpine
    depends_on:
      - api
    environment:
      API_UPSTREAM: api:8080
    volumes:
      - ./app/web/index.html:/usr/share/nginx/html/index.html:ro
      - ./app/web/app.js:/usr/share/nginx/html/app.js:ro
      - ./app/web/styles.css:/usr/share/nginx/html/styles.css:ro
      - ./app/web/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    ports:
      - "8080:8080"

volumes:
  pgdata:
  gocache:
