nameOverride: ""
fullnameOverride: "mural"

image:
  api:
    repository: desafio-api
    tag: "1.0"
    pullPolicy: IfNotPresent
  web:
    repository: desafio-web
    tag: "1.0"
    pullPolicy: IfNotPresent

# Credenciais do banco. Aqui ficam no values por didática, mas o chart as materializa
# num Secret do Kubernetes (nunca hardcoded num Deployment/ConfigMap).
postgres:
  image: postgres:16-alpine
  database: mural
  user: app
  password: secret
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

api:
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 250m
      memory: 128Mi

web:
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 25m
      memory: 16Mi
    limits:
      cpu: 100m
      memory: 64Mi

ingress:
  className: nginx
  host: mural.localtest.me
